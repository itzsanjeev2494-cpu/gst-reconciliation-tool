<!DOCTYPE html>
<html>
<head>
    <title>GST Reconciliation Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .message {
            text-align: center;
            color: green;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>GST Reconciliation Tool</h2>

    <form id="reconForm" action="/run" method="POST" enctype="multipart/form-data">

        <label>Upload Purchase Register:</label>
        <input type="file" name="purchase_file" required>

        <label>Upload GSTR-2B:</label>
        <input type="file" name="gstr_file" required>

        <label>Select Tax Month:</label>
        <select name="tax_month" required>
            <option value="">-- Select Month --</option>
            <option value="April">April</option>
            <option value="May">May</option>
            <option value="June">June</option>
            <option value="July">July</option>
            <option value="August">August</option>
            <option value="September">September</option>
            <option value="October">October</option>
            <option value="November">November</option>
            <option value="December">December</option>
            <option value="January">January</option>
            <option value="February">February</option>
            <option value="March">March</option>
        </select>

        <button type="submit">Run Reconciliation</button>

    </form>
</div>

<script>
document.getElementById("reconForm").addEventListener("submit", function () {
    setTimeout(function () {
        alert("Reconciled Successfully");
    }, 3000);
});
</script>

</body>
</html>
